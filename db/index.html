<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Bücking Dashboard</title>
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0c1f17" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1a13;--bg2:#0c1f17;--panel:#102a1f;--panel-2:#0e241b;--panel-soft:rgba(22,54,40,.45);
  --stroke:rgba(120,180,150,.16);--stroke-strong:rgba(120,180,150,.3);
  --accent:#3ecf8e;--accent-2:#7be0b0;--accent-deep:#1f8f63;--gold:#d9b46a;
  --danger:#e8746b;--warn:#e0b24a;--text:#e8f3ec;--soft:rgba(206,228,216,.66);--softer:rgba(206,228,216,.42);
  --r:18px;--r-sm:12px;--gap:14px;--pad:16px;--sidebarW:264px;--shadow:0 24px 60px rgba(0,0,0,.45);
  --font-display:"Fraunces",Georgia,serif;--font-body:"Outfit",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:var(--font-body);color:var(--text);
  background:radial-gradient(1200px 600px at 12% -5%,rgba(62,207,142,.10),transparent 55%),
    radial-gradient(900px 500px at 95% 0%,rgba(31,143,99,.12),transparent 50%),
    linear-gradient(180deg,var(--bg2),var(--bg));
  -webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:rgba(120,180,150,.22);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* LOGIN */
#login{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:20px;
  background:radial-gradient(900px 500px at 50% -10%,rgba(62,207,142,.14),transparent 60%),linear-gradient(180deg,#0b1d15,#08130d)}
#login.hide{display:none}
.login-card{width:min(420px,100%);background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--stroke);border-radius:24px;box-shadow:var(--shadow);padding:30px 28px;position:relative;overflow:hidden}
.login-card::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(400px 200px at 80% 0%,rgba(62,207,142,.12),transparent 60%)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:22px;position:relative}
.leaf{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(145deg,var(--accent),var(--accent-deep));box-shadow:0 8px 22px rgba(31,143,99,.5);font-size:20px}
.login-logo h1{font-family:var(--font-display);font-size:22px;margin:0;letter-spacing:.2px;font-weight:600}
.login-logo p{margin:2px 0 0;font-size:12px;color:var(--soft)}
.login-card label{font-size:12px;color:var(--soft);display:block;margin:14px 0 6px}
.field input{width:100%;border-radius:14px;border:1px solid var(--stroke);background:rgba(8,20,14,.6);color:var(--text);padding:14px 16px;font-size:15px;outline:none;font-family:var(--font-body);transition:.2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(62,207,142,.14)}
.login-btn{width:100%;margin-top:18px;cursor:pointer;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#062014;padding:14px;font-size:15px;font-weight:800;font-family:var(--font-body);box-shadow:0 10px 26px rgba(31,143,99,.4);transition:.18s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 14px 32px rgba(31,143,99,.5)}
.login-msg{min-height:18px;margin-top:12px;font-size:12.5px;color:var(--soft);text-align:center}
.login-msg.bad{color:var(--danger)}

/* SHELL */
#app{height:100dvh;display:grid;grid-template-columns:var(--sidebarW) 1fr;min-height:0}#app.hide{display:none}
.sidebar{height:100dvh;border-right:1px solid var(--stroke);background:linear-gradient(180deg,rgba(13,33,24,.9),rgba(9,22,15,.92));backdrop-filter:blur(12px);display:flex;flex-direction:column;min-height:0}
.brand{padding:20px 18px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--stroke)}
.brand .leaf{width:34px;height:34px;font-size:17px;border-radius:11px}
.brand-title{font-family:var(--font-display);font-weight:600;font-size:17px;line-height:1}
.brand-sub{font-size:11px;color:var(--soft);margin-top:3px}
.nav{padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow:auto;flex:1 1 auto;min-height:0}
.nav-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--softer);padding:14px 12px 6px;font-weight:700}
.nav a{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--soft);padding:11px 12px;border-radius:13px;border:1px solid transparent;font-size:13.5px;font-weight:600;transition:.15s;cursor:pointer}
.nav a .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--panel-soft);border:1px solid var(--stroke);font-size:15px;flex:0 0 auto;color:var(--accent-2)}
.nav a:hover{background:rgba(62,207,142,.06);color:var(--text)}
.nav a.active{background:linear-gradient(135deg,rgba(62,207,142,.16),rgba(31,143,99,.08));border-color:var(--stroke-strong);color:var(--text)}
.nav a.active .ic{background:linear-gradient(145deg,var(--accent),var(--accent-deep));color:#062014;border-color:transparent}
.sidebar-foot{padding:12px 16px 16px;border-top:1px solid var(--stroke);display:flex;align-items:center;justify-content:space-between;gap:10px}
.chip{font-size:11px;color:var(--soft);background:var(--panel-soft);border:1px solid var(--stroke);padding:6px 11px;border-radius:99px;white-space:nowrap}
.main{min-width:0;min-height:0;display:flex;flex-direction:column}
.topbar{flex:0 0 auto;height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 22px;border-bottom:1px solid var(--stroke);background:rgba(9,22,15,.55);backdrop-filter:blur(12px)}
.topbar h2{font-family:var(--font-display);font-weight:600;font-size:19px;margin:0}
.topbar .sub{font-size:12px;color:var(--soft);margin-top:1px}
.top-right{display:flex;align-items:center;gap:10px}
.btn{cursor:pointer;border-radius:11px;border:1px solid var(--stroke);background:var(--panel-soft);color:var(--text);padding:9px 14px;font-size:12.5px;font-weight:700;font-family:var(--font-body);transition:.15s}
.btn:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,207,142,.1)}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#062014;border:none}
.btn-danger{background:rgba(232,116,107,.1);border-color:rgba(232,116,107,.3);color:#f3b4ae;padding:9px 12px}
.content{flex:1 1 auto;min-height:0;overflow:auto;padding:22px;display:flex;justify-content:center}
.container{width:100%;max-width:1240px;display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:var(--gap);align-content:start}

/* CARDS */
.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--stroke);border-radius:var(--r);overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.28)}
.card-h{padding:16px 18px 12px;border-bottom:1px solid var(--stroke);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-t{font-family:var(--font-display);font-weight:600;font-size:16px;margin:0}
.card-s{font-size:12px;color:var(--soft);margin-top:3px}
.card-b{padding:16px 18px}
.col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-6{grid-column:span 6}.col-4{grid-column:span 4}
@media(max-width:1000px){.col-8,.col-6,.col-4{grid-column:span 12}}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:var(--gap)}
.kpi{background:var(--panel-soft);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:16px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--accent-deep))}
.kpi .k-label{font-size:12px;color:var(--soft)}
.kpi .k-val{font-family:var(--font-display);font-size:25px;font-weight:600;margin-top:6px;letter-spacing:.3px}
.kpi .k-val.k-down{color:#f3b4ae}
.kpi .k-sub{font-size:11.5px;color:var(--softer);margin-top:4px}
.pos-t{color:var(--accent-2)}.neg-t{color:#f3b4ae}

.mini-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.mini-grid>div{background:rgba(8,20,14,.4);border:1px solid var(--stroke);border-radius:11px;padding:11px 13px}
.mini-grid span{font-size:11.5px;color:var(--soft);display:block}
.mini-grid b{font-size:15px;font-weight:700;display:block;margin-top:3px;font-variant-numeric:tabular-nums}

.bar{height:8px;border-radius:99px;background:rgba(8,20,14,.55);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-deep),var(--accent))}

table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--stroke)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--softer);font-weight:700}
tbody tr:hover{background:rgba(62,207,142,.05)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.b-ok{background:rgba(62,207,142,.16);color:var(--accent-2)}.b-free{background:rgba(224,178,74,.16);color:var(--warn)}.b-warn{background:rgba(232,116,107,.16);color:#f3b4ae}

/* spark / dual chart */
.spark{display:flex;align-items:flex-end;gap:5px;height:100px;padding-top:6px}
.spark .col{flex:1;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent-deep));min-height:4px;opacity:.85;transition:.2s}
.spark .col:hover{opacity:1}.spark .col.neg{background:linear-gradient(180deg,#e8746b,#a23f38)}
.dc{display:flex;align-items:flex-end;gap:8px;height:140px}
.dc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.dc-pair{display:flex;align-items:flex-end;gap:3px;height:100%}
.dc-in{width:9px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent-deep))}
.dc-out{width:9px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,#e0b24a,#a8801f)}
.dc-lab{font-size:10px;color:var(--softer)}
.dc-legend{display:flex;gap:18px;margin-top:12px;font-size:11.5px;color:var(--soft)}
.dc-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
.li-in{background:var(--accent)}.li-out{background:var(--warn)}

/* PROJECT HERO */
.proj-hero{grid-column:span 12;position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--stroke-strong);
  background:linear-gradient(135deg,#103526,#0c2419)}
.proj-hero-bg{position:absolute;inset:0;background:radial-gradient(600px 300px at 85% -20%,rgba(62,207,142,.22),transparent 60%),
  radial-gradient(400px 200px at 10% 120%,rgba(217,180,106,.10),transparent 60%)}
.proj-hero-in{position:relative;display:flex;justify-content:space-between;align-items:center;gap:20px;padding:26px 28px 20px}
.proj-tag{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-2);font-weight:700}
.proj-hero h2{font-family:var(--font-display);font-size:34px;font-weight:600;margin:6px 0 8px;letter-spacing:.3px}
.proj-addr{font-size:13.5px;color:var(--soft)}.proj-scope{font-size:13px;color:var(--softer);margin-top:3px}
.ring{--p:0;width:118px;height:118px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;position:relative;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),rgba(8,20,14,.6) 0)}
.ring::before{content:"";position:absolute;inset:11px;border-radius:50%;background:#0d2419;border:1px solid var(--stroke)}
.ring-num{position:relative;font-family:var(--font-display);font-size:30px;font-weight:600;line-height:1}
.ring-num span{font-size:14px;color:var(--accent-2)}
.ring-lab{position:relative;font-size:10.5px;color:var(--soft);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
.proj-stats{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--stroke);border-top:1px solid var(--stroke)}
.proj-stats .ps{background:rgba(8,20,14,.35);padding:14px 18px}
.proj-stats span{font-size:11.5px;color:var(--soft);display:block}
.proj-stats b{font-size:16px;font-weight:700;display:block;margin-top:4px;font-variant-numeric:tabular-nums}
@media(max-width:1000px){.proj-stats{grid-template-columns:repeat(2,1fr)}.proj-hero h2{font-size:26px}}

/* GEWERKE */
.gw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:var(--gap)}
.gw{background:var(--panel-soft);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:15px;border-left:3px solid var(--softer)}
.gw.done{border-left-color:var(--accent)}.gw.wip{border-left-color:var(--gold)}.gw.todo{border-left-color:var(--softer)}
.gw-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.gw-name{font-weight:700;font-size:14px}.gw-pct{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--accent-2)}
.gw-firma{font-size:11.5px;color:var(--soft);margin:3px 0 12px;min-height:16px}
.gw-row{display:flex;justify-content:space-between;font-size:12px;color:var(--soft);margin-top:7px}
.gw-row b{color:var(--text);font-variant-numeric:tabular-nums}

/* TABS */
.ftabs{display:flex;gap:8px;flex-wrap:wrap}
.ftab{cursor:pointer;border:1px solid var(--stroke);background:var(--panel-soft);color:var(--soft);
  padding:9px 16px;border-radius:11px;font-size:13px;font-weight:700;font-family:var(--font-body);transition:.15s}
.ftab:hover{color:var(--text);border-color:var(--stroke-strong)}
.ftab.on{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#062014;border-color:transparent}

/* BREAK-EVEN */
.be-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap)}
@media(max-width:1000px){.be-grid{grid-template-columns:1fr}}
.be-box{background:rgba(8,20,14,.4);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:16px;border-top:3px solid var(--softer)}
.be-box.be-ok{border-top-color:var(--accent)}.be-box.be-soon{border-top-color:var(--gold)}.be-box.be-wait{border-top-color:var(--danger)}
.be-lab{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);font-weight:700}
.be-val{font-family:var(--font-display);font-size:24px;font-weight:600;margin:6px 0 8px}
.be-detail{font-size:12px;color:var(--softer);line-height:1.45}

/* FORM / EDITOR */
.note{font-size:12.5px;color:var(--soft);line-height:1.5}
.note code{background:rgba(8,20,14,.6);padding:2px 6px;border-radius:6px;font-size:11.5px;color:var(--accent-2)}
.form-body{display:flex;flex-direction:column;gap:12px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld>span{font-size:11px;color:var(--soft)}
.fld input,.fld select{border-radius:10px;border:1px solid var(--stroke);background:rgba(8,20,14,.6);color:var(--text);padding:9px 11px;font-size:13px;outline:none;font-family:var(--font-body);width:100%}
.fld input:focus,.fld select:focus{border-color:var(--accent)}
.sub-h{font-family:var(--font-display);font-size:14px;font-weight:600;margin-top:8px;padding-top:12px;border-top:1px solid var(--stroke);color:var(--accent-2)}
.edit-rows{display:flex;flex-direction:column;gap:8px}
.erow{display:grid;gap:8px;align-items:end}
.erow .fld>span{display:none}
.erow.erow-head{align-items:center}
.erow-head span{display:block!important;font-size:11px;color:var(--softer);font-weight:700}
.erow-gw{grid-template-columns:1.4fr 1.6fr 1fr 1fr .8fr auto}
.erow-2{grid-template-columns:2fr 1fr auto}
.erow-fin{grid-template-columns:1fr 1fr 1fr 1fr 1fr auto}
.erow-rent{grid-template-columns:1.3fr .6fr 1.3fr 1fr .8fr .7fr 1fr auto}
.credit-edit{background:rgba(8,20,14,.3);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:14px;display:flex;flex-direction:column;gap:10px}
@media(max-width:900px){.erow-gw,.erow-fin,.erow-rent,.erow-2{grid-template-columns:1fr 1fr}.erow .fld>span{display:block}.erow-head{display:none}}

@media(max-width:860px){
  #app{grid-template-columns:74px 1fr}
  .brand-title,.brand-sub{display:none}
  .nav a{justify-content:center;padding:11px}.nav a .txt{display:none}
  .nav-label{font-size:0;padding:10px 0 4px}
  .sidebar-foot .chip{display:none}
}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="login-logo"><div class="leaf">🌿</div>
      <div><h1>Bücking Dashboard</h1><p>Immobilien · Projekte · Vermietung</p></div></div>
    <label for="pw">Passwort</label>
    <div class="field"><input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" /></div>
    <button class="login-btn" id="loginBtn">Anmelden</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<div id="app" class="hide">
  <aside class="sidebar">
    <div class="brand"><div class="leaf">🌿</div>
      <div><div class="brand-title">Bücking</div><div class="brand-sub">Dashboard</div></div></div>
    <nav class="nav" id="nav">
      <a data-view="home" class="active"><span class="ic">⌂</span><span class="txt">Home</span></a>
      <div class="nav-label">Projekte</div>
      <a data-view="baumstrasse"><span class="ic">🏗</span><span class="txt">Baumstraße</span></a>
      <a data-view="huenenberg"><span class="ic">🏗</span><span class="txt">Am Hünenberg</span></a>
      <div class="nav-label">Betrieb</div>
      <a data-view="vermietung"><span class="ic">🏠</span><span class="txt">Vermietung</span></a>
      <a data-view="finanzen"><span class="ic">€</span><span class="txt">Finanzen</span></a>
      <div class="nav-label">Verwaltung</div>
      <a data-view="daten"><span class="ic">✎</span><span class="txt">Daten</span></a>
    </nav>
    <div class="sidebar-foot"><span class="chip" id="verChip">v—</span>
      <button class="btn btn-danger" id="logoutBtn">Logout</button></div>
  </aside>
  <section class="main">
    <header class="topbar">
      <div><h2 id="pageTitle">Home</h2><div class="sub" id="pageSub">Übersicht</div></div>
      <div class="top-right"><span class="chip" id="clock">—</span></div>
    </header>
    <main class="content"><div class="container" id="views"></div></main>
  </section>
</div>

<script src="./data.js"></script>
<script src="./finance-engine.js"></script>
<script src="./app.js"></script>
</body>
</html>
