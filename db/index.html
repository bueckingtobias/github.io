<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Bücking Dashboard</title>
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#00361e" />
<style>
/* ============================================================================
   Bücking Dashboard — Markendesign
   Smyrna-Grün #004225 · Avenir · gläserne Panels wie auf der Website
   ========================================================================== */
:root{
  --brand:#004225;
  --brand-700:#00361e;
  --brand-800:#002b18;
  --brand-900:#00210f;

  --panel:rgba(255,255,255,.055);
  --panel-2:rgba(255,255,255,.03);
  --panel-soft:rgba(255,255,255,.05);
  --stroke:rgba(255,255,255,.12);
  --stroke-strong:rgba(255,255,255,.22);

  --accent:#3ecf8e;          /* lebendiges Grün für Datenakzente */
  --accent-2:#7be0b0;
  --accent-deep:#1f8f63;
  --gold:#d9b46a;
  --danger:#ff9d9d;
  --warn:#ffd27a;

  --text:#ffffff;
  --soft:rgba(255,255,255,.72);
  --softer:rgba(255,255,255,.46);

  --r:18px;--r-sm:12px;--r-lg:22px;--gap:14px;--pad:16px;--sidebarW:266px;
  --shadow:0 2px 10px rgba(0,0,0,.25);
  --shadow-strong:0 16px 40px rgba(0,0,0,.34);
  --font-body:"Avenir","Avenir Next",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
}
*{box-sizing:border-box}html,body{height:100%}
body{
  margin:0;font-family:var(--font-body);color:var(--text);
  background:
    radial-gradient(1100px 560px at 12% -8%,rgba(255,255,255,.06),transparent 55%),
    radial-gradient(900px 480px at 96% 0%,rgba(62,207,142,.10),transparent 52%),
    linear-gradient(180deg,var(--brand-700) 0%,var(--brand) 44%,var(--brand-800) 100%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;overflow:hidden;letter-spacing:.01em;
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:20px;
  background:radial-gradient(900px 500px at 50% -10%,rgba(62,207,142,.16),transparent 60%),linear-gradient(180deg,var(--brand-700),var(--brand-900))}
#login.hide{display:none}
.login-card{width:min(420px,100%);background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--stroke);border-radius:24px;box-shadow:var(--shadow-strong);padding:34px 30px;position:relative;overflow:hidden;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.login-card::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(420px 220px at 82% -10%,rgba(62,207,142,.14),transparent 60%)}
.login-logo{display:flex;align-items:center;gap:13px;margin-bottom:26px;position:relative}
.leaf{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
  background:linear-gradient(145deg,var(--accent),var(--accent-deep));box-shadow:0 8px 22px rgba(31,143,99,.45);
  font-weight:800;font-size:20px;color:#062014}
.login-logo h1{font-size:21px;margin:0;letter-spacing:.3px;font-weight:800}
.login-logo p{margin:3px 0 0;font-size:12px;color:var(--soft);letter-spacing:.04em}
.login-card label{font-size:12px;color:var(--soft);display:block;margin:16px 0 7px;letter-spacing:.04em}
.field input{width:100%;border-radius:14px;border:1px solid var(--stroke);background:rgba(0,33,15,.4);color:var(--text);
  padding:15px 16px;font-size:15px;outline:none;font-family:var(--font-body);transition:.2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(62,207,142,.16)}
.login-btn{width:100%;margin-top:20px;cursor:pointer;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#062014;padding:15px;
  font-size:15px;font-weight:800;font-family:var(--font-body);box-shadow:0 10px 26px rgba(31,143,99,.4);transition:.18s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 14px 32px rgba(31,143,99,.5)}
.login-msg{min-height:18px;margin-top:13px;font-size:12.5px;color:var(--soft);text-align:center}
.login-msg.bad{color:var(--danger)}

/* ===== SHELL ===== */
#app{height:100dvh;height:100svh;display:grid;grid-template-columns:var(--sidebarW) 1fr;min-height:0;overflow:hidden}
#app.hide{display:none}
.sidebar{height:100dvh;height:100svh;border-right:1px solid var(--stroke);
  background:linear-gradient(180deg,rgba(0,54,30,.72),rgba(0,33,15,.78));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;flex-direction:column;min-height:0}
.brand{padding:22px 18px 18px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--stroke)}
.brand .leaf{width:38px;height:38px;font-size:18px;border-radius:12px}
.brand-title{font-weight:800;font-size:18px;line-height:1;letter-spacing:.2px}
.brand-sub{font-size:11px;color:var(--soft);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
.nav{padding:14px 12px;display:flex;flex-direction:column;gap:3px;overflow:auto;flex:1 1 auto;min-height:0}
.nav-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--softer);padding:16px 12px 7px;font-weight:800}
.nav a{display:flex;align-items:center;gap:13px;text-decoration:none;color:var(--soft);
  padding:12px 13px;border-radius:13px;border:1px solid transparent;font-size:14px;font-weight:700;transition:.16s;cursor:pointer}
.nav a .ic{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;
  background:var(--panel-soft);border:1px solid var(--stroke);font-size:15px;flex:0 0 auto;color:var(--accent-2)}
.nav a:hover{background:rgba(255,255,255,.06);color:var(--text)}
.nav a.active{background:linear-gradient(135deg,rgba(62,207,142,.18),rgba(31,143,99,.08));border-color:var(--stroke-strong);color:var(--text)}
.nav a.active .ic{background:linear-gradient(145deg,var(--accent),var(--accent-deep));color:#062014;border-color:transparent}
.sidebar-foot{padding:14px 16px 18px;border-top:1px solid var(--stroke);display:flex;align-items:center;justify-content:space-between;gap:10px}
.chip{font-size:11px;color:var(--soft);background:var(--panel-soft);border:1px solid var(--stroke);padding:6px 12px;border-radius:99px;white-space:nowrap;font-weight:700}
.chip-air{background:rgba(217,180,106,.16);border-color:rgba(217,180,106,.3);color:var(--gold)}
.main{min-width:0;min-height:0;display:flex;flex-direction:column}
.topbar{flex:0 0 auto;height:66px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:0 24px;border-bottom:1px solid var(--stroke);background:rgba(0,33,15,.4);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.topbar h2{font-weight:800;font-size:20px;margin:0;letter-spacing:.2px}
.topbar .sub{font-size:12px;color:var(--soft);margin-top:2px}
.top-right{display:flex;align-items:center;gap:10px}
.btn{cursor:pointer;border-radius:12px;border:1px solid var(--stroke);background:var(--panel-soft);color:var(--text);
  padding:10px 15px;font-size:12.5px;font-weight:800;font-family:var(--font-body);transition:.16s}
.btn:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,207,142,.12);transform:translateY(-1px)}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#062014;border:none}
.btn-danger{background:rgba(255,157,157,.1);border-color:rgba(255,157,157,.3);color:#ffc4c0;padding:10px 13px}
.content{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;padding:24px;padding-bottom:max(40px,env(safe-area-inset-bottom));display:flex;justify-content:center}
.container{width:100%;max-width:1280px;display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:var(--gap);align-content:start;padding-bottom:8px}

/* ===== CARDS ===== */
.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--stroke);
  border-radius:var(--r);box-shadow:var(--shadow);min-width:0;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.container>*{animation:cardIn .42s ease both}
.container>*:nth-child(2){animation-delay:.04s}
.container>*:nth-child(3){animation-delay:.08s}
.container>*:nth-child(4){animation-delay:.12s}
.container>*:nth-child(5){animation-delay:.16s}
.container>*:nth-child(n+6){animation-delay:.2s}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.home-proj{cursor:pointer;transition:transform .18s ease,box-shadow .2s ease,border-color .2s ease}
.home-proj:hover{transform:translateY(-3px);box-shadow:var(--shadow-strong);border-color:var(--stroke-strong)}
.card-h{padding:17px 19px 13px;border-bottom:1px solid var(--stroke);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-t{font-weight:800;font-size:16px;margin:0;letter-spacing:.2px}
.card-s{font-size:12px;color:var(--soft);margin-top:4px;line-height:1.45}
.card-b{padding:17px 19px}
.col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-7{grid-column:span 7}.col-6{grid-column:span 6}.col-5{grid-column:span 5}.col-4{grid-column:span 4}

/* alerts */
.alerts{display:flex;flex-direction:column;gap:9px}
.alert{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;line-height:1.45;color:var(--text);
  background:rgba(0,33,15,.32);border:1px solid var(--stroke);border-radius:11px;padding:11px 13px}
.alert .adot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;margin-top:5px;background:var(--soft)}
.alert.a-warn .adot{background:var(--warn)}.alert.a-warn{border-color:rgba(255,210,122,.25)}
.alert.a-info .adot{background:var(--accent-2)}
.alert.a-ok .adot{background:var(--accent)}.alert.a-ok{color:var(--soft)}

/* vermietungsstatus */
.vstats{display:flex;flex-direction:column;gap:15px}
.vstat-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.vstat-top b{font-size:14px}.vstat-top span{font-size:13px;color:var(--accent-2);font-weight:800;font-variant-numeric:tabular-nums}
.vstat-sub{font-size:11.5px;color:var(--soft);margin-top:6px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:var(--gap)}
.kpi{background:var(--panel-soft);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:17px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--accent-deep))}
.kpi .k-label{font-size:12px;color:var(--soft);letter-spacing:.02em}
.kpi .k-val{font-size:25px;font-weight:800;margin-top:7px;letter-spacing:.4px;font-variant-numeric:tabular-nums}
.kpi .k-val.k-down{color:#ffc4c0}
.kpi .k-sub{font-size:11.5px;color:var(--softer);margin-top:5px}
.pos-t{color:var(--accent-2)}.neg-t{color:#ffc4c0}

.mini-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.mini-grid>div{background:rgba(0,33,15,.32);border:1px solid var(--stroke);border-radius:11px;padding:12px 14px}
.mini-grid span{font-size:11.5px;color:var(--soft);display:block}
.mini-grid b{font-size:15px;font-weight:800;display:block;margin-top:4px;font-variant-numeric:tabular-nums}

.bar{height:8px;border-radius:99px;background:rgba(0,33,15,.5);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-deep),var(--accent))}

.tw{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
th,td{text-align:left;padding:12px 12px;border-bottom:1px solid var(--stroke);white-space:nowrap}
th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--softer);font-weight:800}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(62,207,142,.06)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:4px 11px;border-radius:99px;font-size:11px;font-weight:800}
.b-ok{background:rgba(62,207,142,.18);color:var(--accent-2)}
.b-free{background:rgba(255,210,122,.16);color:var(--warn)}
.b-warn{background:rgba(255,157,157,.16);color:#ffc4c0}

/* spark / dual chart */
.spark{display:flex;align-items:flex-end;gap:5px;height:104px;padding-top:6px}
.spark .col{flex:1;min-width:8px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent-deep));min-height:4px;opacity:.88;transition:.2s}
.spark .col:hover{opacity:1}.spark .col.neg{background:linear-gradient(180deg,#ff9d9d,#b3504a)}
.dc-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;padding-bottom:4px}
.dc{display:flex;align-items:flex-end;gap:10px;height:150px;min-width:min(100%,640px)}
.dc-col{flex:1;min-width:26px;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.dc-pair{display:flex;align-items:flex-end;gap:3px;height:100%}
.dc-in{width:10px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent-deep))}
.dc-out{width:10px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--gold),#a8801f)}
.dc-lab{font-size:10px;color:var(--softer)}
.dc-legend{display:flex;gap:18px;margin-top:12px;font-size:11.5px;color:var(--soft)}
.dc-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
.li-in{background:var(--accent)}.li-out{background:var(--gold)}

/* PROJECT HERO */
.proj-hero{grid-column:span 12;position:relative;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--stroke-strong);
  background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(0,33,15,.2))}
.proj-hero-bg{position:absolute;inset:0;background:radial-gradient(620px 320px at 86% -25%,rgba(62,207,142,.2),transparent 60%),
  radial-gradient(420px 220px at 8% 130%,rgba(217,180,106,.1),transparent 60%)}
.proj-hero-in{position:relative;display:flex;justify-content:space-between;align-items:center;gap:22px;padding:28px 30px 22px}
.proj-tag{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-2);font-weight:800}
.proj-hero h2{font-size:34px;font-weight:800;margin:8px 0 9px;letter-spacing:.3px;line-height:1.05}
.proj-addr{font-size:13.5px;color:var(--soft)}.proj-scope{font-size:13px;color:var(--softer);margin-top:4px}
.ring{--p:0;width:124px;height:124px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;position:relative;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),rgba(0,33,15,.5) 0);
  box-shadow:0 0 0 1px var(--stroke) inset;animation:ringIn .9s cubic-bezier(.22,.61,.36,1) both}
@keyframes ringIn{from{background:conic-gradient(var(--accent) 0%,rgba(0,33,15,.5) 0)}}
.ring::before{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--brand);border:1px solid var(--stroke)}
.ring-num{position:relative;font-size:30px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.ring-num span{font-size:14px;color:var(--accent-2)}
.ring-lab{position:relative;font-size:10.5px;color:var(--soft);margin-top:3px;text-transform:uppercase;letter-spacing:.1em}
.proj-stats{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--stroke);border-top:1px solid var(--stroke)}
.proj-stats .ps{background:rgba(0,33,15,.28);padding:15px 18px;min-width:0}
.proj-stats span{font-size:11.5px;color:var(--soft);display:block}
.proj-stats b{font-size:16px;font-weight:800;display:block;margin-top:5px;font-variant-numeric:tabular-nums;overflow-wrap:anywhere}

/* GEWERKE */
.gw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:var(--gap)}
.gw{background:var(--panel-soft);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:16px;border-left:3px solid var(--softer)}
.gw.done{border-left-color:var(--accent)}.gw.wip{border-left-color:var(--gold)}.gw.todo{border-left-color:var(--softer)}
.gw-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.gw-name{font-weight:800;font-size:14px}.gw-pct{font-size:18px;font-weight:800;color:var(--accent-2);font-variant-numeric:tabular-nums}
.gw-firma{font-size:11.5px;color:var(--soft);margin:4px 0 13px;min-height:16px}
.gw-row{display:flex;justify-content:space-between;font-size:12px;color:var(--soft);margin-top:7px}
.gw-row b{color:var(--text);font-variant-numeric:tabular-nums}

/* TABS */
.ftabs{display:flex;gap:8px;flex-wrap:wrap}
.ftab{cursor:pointer;border:1px solid var(--stroke);background:var(--panel-soft);color:var(--soft);
  padding:10px 16px;border-radius:12px;font-size:13px;font-weight:800;font-family:var(--font-body);transition:.16s}
.ftab:hover{color:var(--text);border-color:var(--stroke-strong)}
.ftab.on{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#062014;border-color:transparent}

/* BREAK-EVEN */
.be-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap)}
@media(max-width:1000px){.be-grid{grid-template-columns:1fr}}
.be-box{background:rgba(0,33,15,.32);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:17px;border-top:3px solid var(--softer)}
.be-box.be-ok{border-top-color:var(--accent)}.be-box.be-soon{border-top-color:var(--gold)}.be-box.be-wait{border-top-color:var(--danger)}
.be-lab{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--soft);font-weight:800}
.be-val{font-size:24px;font-weight:800;margin:7px 0 9px;font-variant-numeric:tabular-nums}
.be-detail{font-size:12px;color:var(--softer);line-height:1.5}

/* AIRBNB STEUERUNG */
.air-sliders{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px 22px}
.air-sl-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;font-size:13px;color:var(--soft)}
.air-sl-top b{font-size:15px;color:var(--text);font-weight:800;font-variant-numeric:tabular-nums}
.air-sl input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;
  background:linear-gradient(90deg,var(--accent-deep),var(--accent));outline:none;cursor:pointer}
.air-sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;
  background:#fff;border:3px solid var(--accent-deep);box-shadow:0 3px 10px rgba(0,0,0,.35);cursor:pointer}
.air-sl input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid var(--accent-deep);cursor:pointer}
.air-flow{margin-top:20px}
.air-flow-bar{display:flex;gap:3px;height:26px;border-radius:8px;overflow:hidden;margin-bottom:6px;background:rgba(0,33,15,.3)}
.afb{display:block;height:100%}
.afb-in{background:linear-gradient(180deg,var(--accent),var(--accent-deep))}
.afb-prov{background:var(--gold)}
.afb-rein{background:#c98b4a}
.afb-fix{background:#9a7bb0}
.afb-kredit{background:#ff9d9d}
.afb-net{background:linear-gradient(180deg,#fff,#cfe9da)}
.air-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:11.5px;color:var(--soft)}
.air-legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:middle}

/* FORM / EDITOR */
.note{font-size:12.5px;color:var(--soft);line-height:1.55}
.note code{background:rgba(0,33,15,.5);padding:2px 7px;border-radius:6px;font-size:11.5px;color:var(--accent-2)}
.form-body{display:flex;flex-direction:column;gap:15px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:11px 13px}
.fld{display:flex;flex-direction:column;gap:4px;min-width:0}
.fld>span{font-size:11px;color:var(--soft)}
.fld-lab{font-size:10.5px;font-weight:700;color:var(--soft);letter-spacing:.02em}
.fld input,.fld select{border-radius:10px;border:1px solid var(--stroke);background:rgba(0,33,15,.4);color:var(--text);
  padding:9px 11px;font-size:13px;outline:none;font-family:var(--font-body);width:100%}
.fld input:focus,.fld select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,207,142,.12)}
.fld-cur{font-size:10px;color:var(--softer);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fld-cur.changed{color:var(--accent-2);font-style:normal;font-weight:700}
.fld-cur.changed::before{content:"war ";font-weight:400;font-style:italic;color:var(--softer)}
.fld select option{color:#10231a}

.diff-panel{border:1px solid var(--stroke-strong);border-radius:var(--r-sm);background:rgba(0,33,15,.4);padding:15px 17px}
.diff-head{font-weight:800;font-size:14px;color:var(--accent-2);margin-bottom:11px}
.diff-empty{font-size:13px;color:var(--soft)}
.diff-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.diff-row{display:flex;justify-content:space-between;gap:12px;align-items:baseline;font-size:12.5px;padding:8px 11px;border-radius:8px;background:rgba(0,33,15,.34);border:1px solid var(--stroke)}
.diff-path{color:var(--soft);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.diff-val{display:flex;gap:8px;align-items:baseline;flex:0 0 auto;font-variant-numeric:tabular-nums}
.dfrom{color:var(--softer);text-decoration:line-through}
.darrow{color:var(--accent)}
.dto{color:var(--accent-2);font-weight:800}
.diff-note{font-size:11.5px;color:var(--softer);margin-top:11px}
.diff-code{width:100%;min-height:200px;margin-top:8px;border-radius:10px;border:1px solid var(--stroke);background:rgba(0,33,15,.6);color:var(--text);font-family:ui-monospace,Menlo,monospace;font-size:11.5px;padding:11px}
.sub-h{font-weight:800;font-size:14px;margin-top:8px;padding-top:13px;border-top:1px solid var(--stroke);color:var(--accent-2)}
.edit-rows{display:flex;flex-direction:column;gap:9px}
.erow{display:grid;gap:9px;align-items:end}
.erow .fld>.fld-lab{display:none}
.erow .fld>.fld-cur{display:block;font-size:9.5px}
.erow.erow-head{align-items:center}
.erow-head span{display:block!important;font-size:11px;color:var(--softer);font-weight:800}
.erow-gw{grid-template-columns:1.4fr 1.6fr 1fr 1fr .8fr auto}
.erow-2{grid-template-columns:2fr 1fr auto}
.erow-fin{grid-template-columns:1fr 1fr 1fr 1fr 1fr auto}
.erow-rent{grid-template-columns:1.3fr .6fr 1.3fr 1fr .8fr .7fr 1fr auto}
.credit-edit{background:rgba(0,33,15,.26);border:1px solid var(--stroke);border-radius:var(--r-sm);padding:15px;display:flex;flex-direction:column;gap:11px}
.calc-preview{margin-top:11px;padding:12px 15px;border-radius:11px;background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.24);font-size:13px;color:var(--text)}
.calc-preview b{color:var(--accent-2)}
.calc-preview .cp-warn{color:var(--warn)}
.warn-box{margin-bottom:13px;padding:12px 15px;border-radius:11px;background:rgba(255,210,122,.1);border:1px solid rgba(255,210,122,.28);font-size:12.5px;color:#ffe2a8;line-height:1.45}
