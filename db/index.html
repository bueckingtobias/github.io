<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Bücking · Einnahmen</title>
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0a1f1a" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================ SMYRNA GREEN THEME ============================ */
:root{
  --bg:#081813;
  --bg2:#0a1f1a;
  --panel:rgba(18,44,36,.55);
  --panel-solid:#0e2820;
  --glass:rgba(20,48,39,.42);
  --glass-2:rgba(14,36,29,.6);
  --stroke:rgba(120,200,165,.14);
  --stroke-2:rgba(120,200,165,.24);
  --mint:#4ade9e;
  --mint-2:#7ef0bd;
  --deep:#1f7a5a;
  --gold:#d8b978;
  --text:#eaf5ef;
  --soft:rgba(210,232,222,.62);
  --softer:rgba(210,232,222,.4);
  --danger:#f0938a;
  --r:22px;--r-sm:16px;--gap:16px;
  --rail:78px;
  --fdisp:"Space Grotesk",system-ui,sans-serif;
  --fbody:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:var(--fbody);color:var(--text);overflow:hidden;
  background:
    radial-gradient(1100px 640px at 8% -8%,rgba(74,222,158,.10),transparent 55%),
    radial-gradient(900px 560px at 100% 0%,rgba(31,122,90,.18),transparent 52%),
    radial-gradient(700px 700px at 60% 120%,rgba(74,222,158,.06),transparent 60%),
    linear-gradient(180deg,var(--bg2),var(--bg));
  -webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(120,200,165,.2);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* ============================ LOGIN ============================ */
#login{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:22px;
  background:radial-gradient(800px 480px at 50% -10%,rgba(74,222,158,.16),transparent 60%),linear-gradient(180deg,#0a1f1a,#061410)}
#login.hide{display:none}
.login-card{width:min(400px,100%);background:linear-gradient(180deg,var(--glass),var(--glass-2));
  border:1px solid var(--stroke-2);border-radius:26px;padding:34px 30px;backdrop-filter:blur(30px);
  box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);position:relative;overflow:hidden}
.login-orb{position:absolute;width:200px;height:200px;right:-60px;top:-60px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,rgba(126,240,189,.5),rgba(31,122,90,.15) 55%,transparent 70%);filter:blur(6px);opacity:.55}
.login-logo{display:flex;align-items:center;gap:13px;margin-bottom:24px;position:relative}
.mark{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;position:relative;overflow:hidden;
  background:linear-gradient(150deg,var(--mint),var(--deep));box-shadow:0 10px 26px rgba(31,122,90,.5)}
.mark svg{width:24px;height:24px}
.login-logo h1{font-family:var(--fdisp);font-size:21px;margin:0;font-weight:600;letter-spacing:-.01em}
.login-logo p{margin:3px 0 0;font-size:12px;color:var(--soft)}
.login-card label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);display:block;margin:16px 0 8px}
.field input{width:100%;border-radius:14px;border:1px solid var(--stroke-2);background:rgba(6,20,16,.6);color:var(--text);
  padding:14px 16px;font-size:15px;outline:none;font-family:var(--fbody);transition:.2s}
.field input:focus{border-color:var(--mint);box-shadow:0 0 0 4px rgba(74,222,158,.14)}
.login-btn{width:100%;margin-top:20px;cursor:pointer;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--mint),var(--deep));color:#052018;padding:15px;font-size:15px;font-weight:700;
  font-family:var(--fbody);box-shadow:0 12px 30px rgba(31,122,90,.45);transition:.18s}
.login-btn:active{transform:scale(.98)}
.login-msg{min-height:18px;margin-top:13px;font-size:12.5px;color:var(--soft);text-align:center}
.login-msg.bad{color:var(--danger)}

/* ============================ SHELL ============================ */
#app{height:100dvh;height:100svh;display:grid;grid-template-columns:var(--rail) 1fr;overflow:hidden}
#app.hide{display:none}

.rail{height:100dvh;height:100svh;display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px 0;
  border-right:1px solid var(--stroke);background:linear-gradient(180deg,rgba(10,31,26,.7),rgba(6,20,16,.75));backdrop-filter:blur(16px)}
.rail-mark{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;margin-bottom:16px;
  background:linear-gradient(150deg,var(--mint),var(--deep));box-shadow:0 10px 26px rgba(31,122,90,.5)}
.rail-mark svg{width:24px;height:24px}
.rail-btn{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;cursor:pointer;position:relative;
  color:var(--soft);border:1px solid transparent;transition:.16s;background:transparent}
.rail-btn svg{width:21px;height:21px}
.rail-btn:hover{color:var(--text);background:rgba(74,222,158,.08)}
.rail-btn.on{color:#052018;background:linear-gradient(150deg,var(--mint),var(--mint-2));box-shadow:0 8px 20px rgba(74,222,158,.35)}
.rail-btn .tip{position:absolute;left:58px;top:50%;transform:translateY(-50%);white-space:nowrap;
  background:var(--panel-solid);border:1px solid var(--stroke-2);color:var(--text);font-size:12px;font-weight:600;
  padding:6px 11px;border-radius:9px;opacity:0;pointer-events:none;transition:.15s;z-index:20}
.rail-btn:hover .tip{opacity:1}
.rail-spacer{flex:1}
.rail-btn.logout{color:var(--danger)}

.main{min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.head{flex:0 0 auto;padding:22px 30px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mint);font-weight:600}
.head h2{font-family:var(--fdisp);font-weight:600;font-size:30px;margin:6px 0 0;letter-spacing:-.02em}
.head .sub{font-size:13px;color:var(--soft);margin-top:4px}
.head-pill{display:flex;align-items:center;gap:9px;background:var(--glass);border:1px solid var(--stroke-2);
  padding:9px 15px;border-radius:99px;font-size:12.5px;color:var(--soft);backdrop-filter:blur(20px);white-space:nowrap}
.head-pill b{color:var(--mint-2);font-family:var(--fdisp);font-weight:600}
.scroll{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:22px 30px;padding-bottom:max(40px,env(safe-area-inset-bottom))}
.wrap{max-width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:var(--gap)}

/* ============================ CARDS ============================ */
.grid{display:grid;gap:var(--gap)}
.g-kpi{grid-template-columns:repeat(4,1fr)}
.g-2{grid-template-columns:1fr 1fr}
.g-3{grid-template-columns:repeat(3,1fr)}
.card{position:relative;background:linear-gradient(160deg,var(--glass),var(--glass-2));border:1px solid var(--stroke);
  border-radius:var(--r);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
  overflow:hidden}
.card.pad{padding:22px}
.card-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(300px 160px at 85% 0%,rgba(74,222,158,.08),transparent 60%)}

/* KPI card — reference style: icon chip top-left, big number, small label */
.kpi{position:relative;padding:22px}
.kpi .chip{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;
  background:rgba(8,24,19,.6);border:1px solid var(--stroke-2);color:var(--mint-2);margin-bottom:20px}
.kpi .chip svg{width:22px;height:22px}
.kpi .num{font-family:var(--fdisp);font-weight:600;font-size:40px;line-height:1;letter-spacing:-.02em}
.kpi .lab{font-size:14px;font-weight:600;margin-top:12px}
.kpi .desc{font-size:12px;color:var(--soft);margin-top:3px}
.kpi.accent{background:linear-gradient(160deg,rgba(74,222,158,.16),rgba(31,122,90,.1))}
.kpi.accent .chip{background:linear-gradient(150deg,var(--mint),var(--deep));color:#052018;border-color:transparent}
.kpi.accent .num{color:var(--mint-2)}

.card-h{padding:20px 22px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-t{font-family:var(--fdisp);font-weight:600;font-size:17px;margin:0;letter-spacing:-.01em}
.card-s{font-size:12.5px;color:var(--soft);margin-top:3px}
.card-b{padding:18px 22px 22px}

/* ============================ CHARTS ============================ */
/* Area/line cashflow chart (SVG) */
.chart-wrap{width:100%;overflow:hidden}
.chart{width:100%;height:auto;display:block}
.chart .grid-l{stroke:rgba(120,200,165,.08);stroke-width:1}
.chart .area{fill:url(#mintFill)}
.chart .line{fill:none;stroke:var(--mint);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.chart .dot{fill:var(--bg2);stroke:var(--mint);stroke-width:2.5}
.chart .lastdot{fill:var(--mint)}
.chart-x{display:flex;justify-content:space-between;margin-top:8px;font-size:10.5px;color:var(--softer)}

/* Donut / composition */
.donut-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut{flex:0 0 auto}
.legend{flex:1 1 200px;display:flex;flex-direction:column;gap:10px;min-width:0}
.leg{display:flex;align-items:center;gap:11px;font-size:13px}
.leg .sw{width:11px;height:11px;border-radius:4px;flex:0 0 auto}
.leg .lt{flex:1;color:var(--soft);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leg .lv{font-family:var(--fdisp);font-weight:600;font-variant-numeric:tabular-nums}

/* Horizontal bars */
.hbars{display:flex;flex-direction:column;gap:14px}
.hbar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;gap:10px}
.hbar-name{font-size:13.5px;font-weight:600}
.hbar-name .loc{font-size:11.5px;color:var(--softer);font-weight:400;margin-left:6px}
.hbar-val{font-family:var(--fdisp);font-weight:600;font-size:15px;font-variant-numeric:tabular-nums}
.track{height:11px;border-radius:99px;background:rgba(6,20,16,.6);overflow:hidden;position:relative}
.track>span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--deep),var(--mint));position:relative;transition:width .8s cubic-bezier(.22,.61,.36,1)}
.track.ghost>span{opacity:.4;background:linear-gradient(90deg,rgba(120,200,165,.3),rgba(120,200,165,.5))}

/* stream tiles (overview list) */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap)}
.tile{cursor:pointer;position:relative;padding:20px;border-radius:var(--r-sm);border:1px solid var(--stroke);
  background:linear-gradient(160deg,var(--glass),var(--glass-2));transition:.18s;overflow:hidden}
.tile:hover{border-color:var(--stroke-2);transform:translateY(-2px)}
.tile:hover .tile-go{opacity:1;transform:translateX(0)}
.tile-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.tile-ic{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto;
  background:rgba(8,24,19,.6);border:1px solid var(--stroke-2);color:var(--mint-2)}
.tile-ic svg{width:21px;height:21px}
.tile-name{font-family:var(--fdisp);font-weight:600;font-size:15.5px;line-height:1.15}
.tile-loc{font-size:11.5px;color:var(--softer);margin-top:2px}
.tile-num{font-family:var(--fdisp);font-weight:600;font-size:30px;letter-spacing:-.02em}
.tile-num small{font-size:14px;color:var(--soft);font-weight:500}
.tile-meta{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.pillet{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;background:rgba(8,24,19,.55);border:1px solid var(--stroke);color:var(--soft)}
.pillet.on{color:var(--mint-2);border-color:var(--stroke-2);background:rgba(74,222,158,.1)}
.pillet.invest{color:var(--gold);background:rgba(216,185,120,.1);border-color:rgba(216,185,120,.25)}
.tile-go{position:absolute;right:18px;top:20px;color:var(--mint);opacity:0;transform:translateX(-4px);transition:.18s}

/* detail rows */
.drow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--stroke)}
.drow:last-child{border-bottom:none}
.drow-l{display:flex;align-items:center;gap:12px;min-width:0}
.drow-badge{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;
  background:rgba(8,24,19,.6);border:1px solid var(--stroke);font-family:var(--fdisp);font-weight:600;font-size:14px;color:var(--mint-2)}
.drow-name{font-weight:600;font-size:14px}
.drow-sub{font-size:11.5px;color:var(--softer)}
.drow-val{text-align:right;flex:0 0 auto}
.drow-val b{font-family:var(--fdisp);font-weight:600;font-size:16px;font-variant-numeric:tabular-nums;display:block}
.drow-val span{font-size:11px;color:var(--softer)}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:700}
.b-on{background:rgba(74,222,158,.16);color:var(--mint-2)}
.b-off{background:rgba(216,185,120,.16);color:var(--gold)}

.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--stroke);
  border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--stroke)}
/* ETF live-cards */
.etf-grid{gap:var(--gap)}
.etf-card{display:flex;flex-direction:column}
.etf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.etf-badge{width:40px;height:40px;border-radius:12px;display:grid;place-items:center}
.etf-badge svg{width:20px;height:20px}
.etf-cagr{font-size:11.5px;font-weight:600;color:var(--mint-2);background:rgba(74,222,158,.1);border:1px solid var(--stroke-2);padding:5px 11px;border-radius:99px}
.etf-name{font-family:var(--fdisp);font-weight:600;font-size:16px}
.etf-sub{font-size:11px;color:var(--softer);margin-top:3px}
.etf-val{font-family:var(--fdisp);font-weight:600;font-size:30px;letter-spacing:-.02em;margin:14px 0 4px}
.etf-foot{display:flex;justify-content:space-between;align-items:baseline;margin-top:auto;padding-top:12px;border-top:1px solid var(--stroke);font-size:12px;color:var(--soft)}
.etf-foot b{font-family:var(--fdisp);color:var(--text)}
.stat-strip .s{background:var(--glass-2);padding:16px 18px}
.stat-strip .s span{font-size:11px;color:var(--soft);display:block}
.stat-strip .s b{font-family:var(--fdisp);font-weight:600;font-size:20px;margin-top:5px;display:block;font-variant-numeric:tabular-nums}

.note{font-size:12.5px;color:var(--soft);line-height:1.5}

.view{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.wrap>*{animation:fade .4s ease both}
.wrap>*:nth-child(2){animation-delay:.05s}.wrap>*:nth-child(3){animation-delay:.1s}
.wrap>*:nth-child(4){animation-delay:.15s}.wrap>*:nth-child(n+5){animation-delay:.2s}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============================ iPad Pro 13" ============================ */
@media(max-width:1200px){
  .g-kpi{grid-template-columns:repeat(2,1fr)}
  .head h2{font-size:27px}
}
@media(max-width:900px){
  .g-2,.g-3{grid-template-columns:1fr}
  .tiles{grid-template-columns:1fr}
}

/* ============================ iPhone 17 Pro Max ============================ */
@media(max-width:560px){
  #app{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .rail{position:fixed;left:0;right:0;bottom:0;top:auto;height:auto;width:100%;flex-direction:row;
    justify-content:space-around;padding:8px 6px;padding-bottom:calc(8px + env(safe-area-inset-bottom));
    border-right:none;border-top:1px solid var(--stroke);z-index:40;gap:2px}
  .rail-mark,.rail-spacer{display:none}
  .rail-btn{width:auto;height:auto;flex:1 1 0;flex-direction:column;gap:4px;padding:8px 4px;border-radius:14px;font-size:9.5px}
  .rail-btn svg{width:22px;height:22px}
  .rail-btn .tip{position:static;transform:none;opacity:1;background:none;border:none;padding:0;color:inherit;
    font-size:9.5px;font-weight:600;pointer-events:none}
  .rail-btn.on .tip{color:#052018}
  .rail-btn.logout .tip{color:var(--danger)}

  .main{height:100dvh;height:100svh}
  .head{padding:16px 18px 0;flex-direction:column;gap:10px}
  .head h2{font-size:24px}
  .head-pill{align-self:flex-start}
  .scroll{padding:16px 16px;padding-bottom:calc(88px + env(safe-area-inset-bottom))}
  .g-kpi{grid-template-columns:1fr 1fr;gap:12px}
  .kpi{padding:16px}
  .kpi .chip{width:40px;height:40px;margin-bottom:14px}
  .kpi .num{font-size:30px}
  .kpi .lab{font-size:13px;margin-top:9px}
  .card.pad{padding:17px}
  .card-h{padding:17px 17px 0}.card-b{padding:15px 17px 18px}
  .donut-row{gap:16px}
  .tile-num{font-size:26px}
  .stat-strip{grid-template-columns:1fr 1fr}
}
@media(max-width:380px){
  .g-kpi{grid-template-columns:1fr}
  .rail-btn .tip{font-size:9px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-orb"></div>
    <div class="login-logo">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 15c3-1 5-9 8-9s3 8 4 9" stroke="#052018" stroke-width="2.2" stroke-linecap="round"/><circle cx="12" cy="18" r="1.6" fill="#052018"/></svg></div>
      <div><h1>Bücking</h1><p>Einnahmen-Übersicht</p></div>
    </div>
    <label for="pw">Passwort</label>
    <div class="field"><input id="pw" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="login-btn" id="loginBtn">Anmelden</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <nav class="rail" id="rail">
    <div class="rail-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 15c3-1 5-9 8-9s3 8 4 9" stroke="#052018" stroke-width="2.2" stroke-linecap="round"/><circle cx="12" cy="18" r="1.6" fill="#052018"/></svg></div>
    <!-- nav buttons injected -->
    <div class="rail-spacer"></div>
    <button class="rail-btn logout" id="logoutBtn" title="Logout">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tip">Logout</span>
    </button>
  </nav>
  <section class="main">
    <header class="head">
      <div>
        <div class="eyebrow" id="eyebrow">Portfolio</div>
        <h2 id="pageTitle">Übersicht</h2>
        <div class="sub" id="pageSub"></div>
      </div>
      <div class="head-pill" id="headPill"></div>
    </header>
    <div class="scroll"><div class="wrap" id="views"></div></div>
  </section>
</div>

<script src="./data.js"></script>
<script src="./finance-engine.js"></script>
<script src="./app.js"></script>
</body>
</html>
