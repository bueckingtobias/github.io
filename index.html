<html lang="de">
<head>
  <meta charset="UTF-8" />

  <!-- ===== ENDE SEO ===== -->
  
  <style>
    :root{
      --brand:#004225;          /* Smyrna-Grün */
      --brand-700:#00361e;
      --text:#ffffff;
      --bg:#004225;
      --muted:#ffffff1a;
      --shadow:0 2px 10px rgba(0,0,0,.25);
      --radius:12px;
      --maxw:1200px;
      --nav-h:46px;

      /* werden per JS präzise gesetzt */
      --header-h: 110px;         /* Fallback */
      --footer-h: 64px;          /* Fallback */
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *{ box-sizing:border-box }
    html,body{
      margin:0; padding:0;
      font-family:"Avenir",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:var(--bg);
      scroll-behavior:smooth;
    }

    /* sorgt dafür, dass Anker-Scroll nicht unter dem Header verschwindet */
    html{ scroll-padding-top: calc(var(--header-h) + 10px) }

    /* ===== Header (fix) ===== */

    /* ===== Einheitlicher Header / Navigation / Footer ===== */
    header.site-header{
      position:fixed; top:0; left:0; right:0; z-index:1000;
      background:rgba(0,54,30,.92);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      color:var(--text);
      box-shadow:var(--shadow);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    /* Kopfzeile: auf Mobil Logo links + Burger rechts in EINER Zeile,
       ab iPad/Desktop Logo mittig */
    .header-top{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; padding:10px 14px;
    }
    .brand-link{ display:inline-flex; align-items:center; gap:10px; color:var(--text); text-decoration:none; }
    .brand-logo{ height:38px; width:auto; display:block; filter:brightness(0) invert(1); }

    /* Burger sitzt in der Kopfzeile (Mobil) */
    .menu-toggle{
      flex:0 0 auto; width:42px; height:42px;
      border:0; background:transparent; color:var(--text);
      display:inline-grid; place-items:center; border-radius:8px; cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    /* Sauberes Burger-/X-Icon ohne Überlappung */
    .menu-icon{ position:relative; display:block; width:24px; height:18px; }
    .menu-icon span{
      position:absolute; left:0; height:2px; width:100%;
      background:var(--text); border-radius:2px;
      transition:transform .25s ease, opacity .2s ease, top .25s ease;
    }
    .menu-icon span:nth-child(1){ top:0 }
    .menu-icon span:nth-child(2){ top:8px }
    .menu-icon span:nth-child(3){ top:16px }
    .menu-toggle[aria-expanded="true"] .menu-icon span:nth-child(1){ top:8px; transform:rotate(45deg) }
    .menu-toggle[aria-expanded="true"] .menu-icon span:nth-child(2){ opacity:0 }
    .menu-toggle[aria-expanded="true"] .menu-icon span:nth-child(3){ top:8px; transform:rotate(-45deg) }

    /* Desktop-Navigationszeile (nur ab 900px sichtbar) */
    .header-nav{
      display:none; align-items:center; justify-content:center;
      border-top:1px solid rgba(255,255,255,.12);
      min-height:var(--nav-h); padding:0 8px; position:relative;
    }
    nav.primary ul{ list-style:none; margin:0; padding:0; display:flex; gap:28px; align-items:center; }
    nav.primary a{ color:var(--text); text-decoration:none; font-weight:700; padding:10px 6px; border-radius:8px; transition:opacity .2s ease; }
    nav.primary a:hover{ opacity:.8 }
    nav.primary a[aria-current="page"]{ text-decoration:underline }

    .drawer-backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:999;
    }
    .drawer{
      position:fixed; left:0; right:0;
      top:var(--header-h);
      bottom:calc(var(--footer-h) + var(--safe-bottom));
      background:var(--brand); color:var(--text);
      transform:translateY(-8px); opacity:0; pointer-events:none;
      border-bottom:1px solid rgba(255,255,255,.15);
      box-shadow:0 10px 25px rgba(0,0,0,.25);
      transition:transform .25s ease, opacity .25s ease; z-index:1001;
      overflow:auto; -webkit-overflow-scrolling:touch;
    }
    .drawer.open,.drawer-backdrop.open{ pointer-events:auto }
    .drawer.open{ transform:translateY(0); opacity:1 }
    .drawer-backdrop.open{ opacity:1 }
    .drawer nav{ padding:14px 16px 18px }
    .drawer ul{ list-style:none; margin:0; padding:0; display:grid; gap:8px }
    .drawer a{
      display:block; text-decoration:none; color:var(--text); font-weight:700;
      padding:12px 10px; border-radius:10px; background:var(--muted);
    }

    /* Ab iPad / Desktop: mittiges Logo, Nav-Zeile sichtbar, Burger aus */
    @media (min-width:768px){
      .header-top{ justify-content:center; padding:14px 16px }
      .brand-logo{ height:46px }
      .header-nav{ display:flex }
      .menu-toggle{ display:none }
      .drawer,.drawer-backdrop{ display:none }
    }

    /* ===== Einheitlicher Footer (fix, mit Impressum-Link) ===== */
    footer.site-footer{
      position:fixed; left:0; right:0; bottom:0; z-index:1000;
      background:rgba(0,54,30,.94);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      color:var(--text); text-align:center;
      padding:12px 18px calc(12px + var(--safe-bottom));
      font-size:.9rem; line-height:1.5;
      box-shadow:0 -2px 10px rgba(0,0,0,.25);
      border-top:1px solid rgba(255,255,255,.08);
    }
    footer.site-footer a{ color:var(--text); text-decoration:underline; font-weight:600 }
    footer.site-footer a:hover{ opacity:.8 }
    .footer-inner{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px 14px }
    .footer-sep{ opacity:.5 }

  </style>
</head>

<body>
    <header class="site-header" role="banner">
    <div class="header-top">
      <a class="brand-link" href="index.html#top" aria-label="Zur Startseite">
        <img class="brand-logo" src="logo.png" alt="Bücking Immobilien Logo" />
      </a>
      <button class="menu-toggle" aria-label="Menü öffnen" aria-expanded="false" aria-controls="mobile-drawer">
        <span class="menu-icon"><span></span><span></span><span></span></span>
      </button>
    </div>

    <div class="header-nav">
      <nav class="primary" aria-label="Hauptnavigation">
        <ul>
          <li><a href="index.html#home" aria-current="page">Home</a></li>
          <li><a href="projekte.html">Projekte</a></li>
          <li><a href="unternehmen.html">Unternehmen</a></li>
          <li><a href="kontakt.html">Kontakt</a></li>
          <li><a href="impressum.html">Impressum</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
  <div class="drawer" id="mobile-drawer" role="dialog" aria-modal="true" aria-label="Navigation" hidden>
    <nav aria-label="Mobile Navigation">
      <ul>
          <li><a href="index.html#home" aria-current="page">Home</a></li>
          <li><a href="projekte.html">Projekte</a></li>
          <li><a href="unternehmen.html">Unternehmen</a></li>
          <li><a href="kontakt.html">Kontakt</a></li>
          <li><a href="impressum.html">Impressum</a></li>
      </ul>
    </nav>
  </div>

  <main id="top">
    <div id="section-host" class="section-host" aria-live="polite"></div>
  </main>

    <footer class="site-footer">
    <div class="footer-inner">
      <span>&copy; 2026 Bücking Immobilien GmbH &amp; Co. KG – Alle Rechte vorbehalten</span>
      <span class="footer-sep">·</span>
      <a href="impressum.html">Impressum &amp; Datenschutz</a>
    </div>
  </footer>

    <script>
    /* ===== Höhen von Header/Footer dynamisch setzen ===== */
    function updateChromeVars(){
      const header = document.querySelector('.site-header');
      const footer = document.querySelector('.site-footer');
      const root   = document.documentElement;
      root.style.setProperty('--header-h', (header?.offsetHeight || 84) + 'px');
      root.style.setProperty('--footer-h', (footer?.offsetHeight || 56) + 'px');
    }
    window.addEventListener('load', updateChromeVars);
    window.addEventListener('resize', () => { clearTimeout(window.__rz); window.__rz = setTimeout(updateChromeVars, 100); });

    /* ===== Mobiles Menü ===== */
    (function(){
      const body = document.body;
      const toggle = document.querySelector('.menu-toggle');
      const drawer = document.getElementById('mobile-drawer');
      const backdrop = document.getElementById('drawer-backdrop');
      if(!toggle || !drawer || !backdrop) return;

      function openMenu(){
        toggle.setAttribute('aria-expanded','true');
        drawer.hidden = false; backdrop.hidden = false;
        requestAnimationFrame(() => {
          drawer.classList.add('open'); backdrop.classList.add('open');
          body.style.overflow = 'hidden';
          const first = drawer.querySelector('a'); if(first) first.focus();
        });
      }
      function closeMenu(){
        toggle.setAttribute('aria-expanded','false');
        drawer.classList.remove('open'); backdrop.classList.remove('open');
        body.style.overflow = '';
        setTimeout(() => { drawer.hidden = true; backdrop.hidden = true; }, 220);
      }
      toggle.addEventListener('click', () => {
        toggle.getAttribute('aria-expanded') === 'true' ? closeMenu() : openMenu();
      });
      backdrop.addEventListener('click', closeMenu);
      drawer.addEventListener('click', e => { if(e.target.closest('a')) closeMenu(); });
      window.addEventListener('keydown', e => { if(e.key === 'Escape') closeMenu(); });
    })();

    /* ===== Module: dynamisches Laden (mit Style-Hoisting) ===== */
    const files = ['landing.html','leitbild.html','zitat.html'];
    const host = document.getElementById('section-host');

    async function loadSection(file){
      try{
        const res = await fetch(file, {cache:'no-store'});
        if(!res.ok) throw new Error(file+' '+res.status);
        const html = await res.text();

        const range = document.createRange();
        const frag  = range.createContextualFragment(html);

        frag.querySelectorAll('style').forEach(styleTag => {
          document.head.appendChild(styleTag.cloneNode(true));
          styleTag.remove();
        });
        frag.querySelectorAll('link[rel="stylesheet"]').forEach(linkTag => {
          document.head.appendChild(linkTag.cloneNode(true));
          linkTag.remove();
        });

        const wrapper = document.createElement('div');
        wrapper.className = 'module';
        wrapper.appendChild(frag);
        host.appendChild(wrapper);
      }catch(err){ console.error(err); }
    }
    (async () => { for(const f of files){ await loadSection(f); } updateChromeVars(); })();
  </script>
</body>
</html>
